name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test-262-language:
    name: Test262 Language Regression Tests
    uses: ./.github/workflows/tests-262-baseline-language.yml
    with:
      ref: ${{ github.sha }}

  test-262-builtins:
    name: Test262 Built-in Regression Tests
    uses: ./.github/workflows/tests-262-baseline-builtins.yml
    with:
      ref: ${{ github.sha }}

  test-e2e:
    name: End to End Tests
    uses: ./.github/workflows/tests-e2e.yml
    with:
      ref: ${{ github.sha }}

  release:
    name: Version or Publish
    needs: [test-262-language, test-262-builtins, test-e2e]
    if: github.repository == 'SunsetFi/suntime-js'
    runs-on: ubuntu-latest
    # Required approval.  Currently annoying to use as we can't differentiate
    # between a changeset compilation and a release.
    # We would need to add main to this env anyway... Currently it's orphaned
    # at only allowing tags.
    # environment: npm-publish
    permissions:
      contents: write # create the Version Packages PR / tags
      pull-requests: write # open/update the Version Packages PR
      id-token: write # OIDC provenance for npm publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter "./packages/*" build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run changeset:version
          publish: pnpm run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
