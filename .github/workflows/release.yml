name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test-262-language:
    name: Test262 Language Regression Tests
    uses: ./.github/workflows/tests-262-baseline-language.yml
    with:
      ref: ${{ github.sha }}

  test-262-builtins:
    name: Test262 Built-in Regression Tests
    uses: ./.github/workflows/tests-262-baseline-builtins.yml
    with:
      ref: ${{ github.sha }}

  test-e2e:
    name: End to End Tests
    uses: ./.github/workflows/tests-e2e.yml
    with:
      ref: ${{ github.sha }}

  version:
    name: Version
    needs: [test-262-language, test-262-builtins, test-e2e]
    if: github.repository == 'SunsetFi/suntime-js'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    permissions:
      contents: write # to create release (changesets/action)
      issues: write # to post issue comments (changesets/action)
      pull-requests: write # to create pull request (changesets/action)
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Create or update release pull request
        id: changesets
        # https://github.com/changesets/action
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run changeset:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish
    if: github.repository == 'SunsetFi/suntime-js' && needs.version.outputs.hasChangesets == 'false'
    needs: version
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 20
    permissions:
      contents: write # to create release (changesets/action)
      id-token: write # to use OpenID Connect token for trusted publishing (changesets/action)
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm run release:publish
