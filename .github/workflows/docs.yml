name: Deploy Docs + Playground

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "pnpm"
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Build the Vite sandbox app (also builds its workspace dep @suntime-js/core).
      - name: Sync Playground
        run: pnpm run --filter @suntime-js/docs sync:playground

      - name: Sync @suntime-js/core types
        run: pnpm run --filter @suntime-js/docs sync:suntime

      # Build the Docusaurus site. @suntime-js/core was already built above.
      - name: Build Docusaurus
        run: pnpm run --filter @suntime-js/docs build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: docs
          path: docs/build

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: docs
