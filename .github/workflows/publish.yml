name: Publish Package to npmjs

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify tag matches package.json version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # need full history to verify tag is on main
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./packages/core/package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"   # strip leading 'v' -> 0.8.5
          echo "package.json: $PKG_VERSION"
          echo "git tag:      $GITHUB_REF_NAME ($TAG_VERSION)"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - name: Verify tag is on main
        run: git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

  test-262-language:
    name: Run Test262 language regression tests
    needs: verify
    uses: ./.github/workflows/tests-262-baseline-language.yml
    with:
      ref: ${{ github.sha }}

  test-262-builtins:
    name: Run Test262 builtins regression tests
    needs: verify
    uses: ./.github/workflows/tests-262-baseline-builtins.yml
    with:
      ref: ${{ github.sha }}

  test-e2e:
    name: Run end to end tests
    needs: verify
    uses: ./.github/workflows/tests-e2e.yml
    with:
      ref: ${{ github.sha }}

  build:
    name: Build @suntime-js/core
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"
          # Recommended by actions/setup-node for when security is needed.
          package-manager-cache: false
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Build package
        run: pnpm --filter @suntime-js/core build
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: packages/core/dist/
          if-no-files-found: error

  publish:
    name: Publish @suntime-js/core to npmjs
    # only run on main, don't trigger in forks
    if: github.repository == 'SunsetFi/suntime-js'
    needs: [verify, test-262-language, test-262-builtins, test-e2e, build]
    runs-on: ubuntu-latest
    # Gated environment: a publish pauses for required-reviewer approval before
    # the OIDC credential is mintable. Must match the environment field on the
    # npm trusted-publisher config.
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          # Recommended by actions/setup-node for when security is needed.
          package-manager-cache: false
      - name: Download build artifact
        # Note: 8.x works with 7.x upload; is a breaking change due to migration to ESM.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: packages/core/dist/
      - name: Publish package to npmjs
        run: pnpm publish --access public --filter @suntime-js/core --no-git-checks
